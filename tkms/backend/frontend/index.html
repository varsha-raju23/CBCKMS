<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TunnelKMS</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a, #1e3a8a, #2563eb);
      overflow: hidden;
      color: white;
    }

    .splash {
      text-align: center;
      animation: fadeIn 0.8s ease-in-out;
    }

    .logo {
      width: 110px;
      height: 110px;
      margin: 0 auto 22px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.16);
      border: 1px solid rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(16px);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      font-weight: 800;
      letter-spacing: 1px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
      animation: pulse 1.8s infinite ease-in-out;
    }

    h1 {
      font-size: 34px;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    p {
      font-size: 15px;
      opacity: 0.85;
    }

    .loader {
      width: 180px;
      height: 4px;
      margin: 28px auto 0;
      background: rgba(255, 255, 255, 0.25);
      border-radius: 999px;
      overflow: hidden;
    }

    .loader span {
      display: block;
      height: 100%;
      width: 45%;
      background: white;
      border-radius: 999px;
      animation: loading 1.2s infinite ease-in-out;
    }

    .circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      animation: float 6s infinite ease-in-out;
    }

    .circle.one {
      width: 220px;
      height: 220px;
      top: 12%;
      left: 12%;
    }

    .circle.two {
      width: 300px;
      height: 300px;
      right: 10%;
      bottom: 10%;
      animation-delay: 1s;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.06);
      }
    }

    @keyframes loading {
      0% {
        transform: translateX(-120%);
      }

      100% {
        transform: translateX(260%);
      }
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-22px);
      }
    }
  </style>
    <link rel="stylesheet" href="/css/final-ui-fix.css">
</head>

<body>
  <div class="circle one"></div>
  <div class="circle two"></div>

  <main class="splash">
    <div class="logo">TK</div>
    <h1>TunnelKMS</h1>
    <p>Construction Knowledge Management System</p>
    <div class="loader"><span></span></div>
  </main>

  <script>
    setTimeout(function () {
      window.location.href = "./pages/login.html";
    }, 2800);
  </script>
    <script src="/js/final-ui-fix.js"></script>
  <script src="/js/remove-dashboard-profile.js"></script>
</body>

</html>
