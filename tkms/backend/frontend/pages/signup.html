<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
<meta charset="UTF-8">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account - TunnelKMS</title>
  <link rel="stylesheet" href="../css/style.css">

  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      background:
        radial-gradient(circle at top, rgba(56, 189, 248, 0.12), transparent 34%),
        linear-gradient(135deg, #07111f 0%, #0b1f35 50%, #123c69 100%);
    }

    .signup-card {
      width: 100%;
      max-width: 560px;
    }

    .brand-mark {
      width: 72px;
      height: 72px;
      margin: 0 auto 24px;
      border-radius: 20px;
      background: linear-gradient(135deg, #38bdf8 0%, #2563eb 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 18px 42px rgba(37, 99, 235, 0.35);
    }

    .brand-mark span {
      color: #ffffff;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 1px;
      font-family: "Space Grotesk", sans-serif;
    }

    .error-msg {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      display: none;
    }

    .error-msg.show {
      display: block;
    }

    .success-msg {
      display: none;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #86efac;
      padding: 16px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      text-align: center;
      line-height: 1.6;
    }

    .password-req {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .password-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }

    .role-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .role-option {
      border: 1.5px solid var(--border-light);
      border-radius: var(--radius-sm);
      padding: 14px 12px;
      cursor: pointer;
      transition: var(--transition);
      text-align: center;
      background: rgba(8, 24, 39, 0.45);
    }

    .role-option:hover,
    .role-option.selected {
      border-color: #38bdf8;
      background: rgba(56, 189, 248, 0.12);
    }

    .role-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .role-desc {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    @media (max-width: 560px) {
      .two-col {
        grid-template-columns: 1fr !important;
      }
    }
  </style>
    <link rel="stylesheet" href="/css/final-ui-fix.css">
</head>

<body>
  <div class="auth-page">
    <div class="auth-card signup-card">
      <div class="auth-logo">
        <div class="brand-mark">
          <span>TK</span>
        </div>
        <h1>Create Account</h1>
        <p>Request access to TunnelKMS</p>
      </div>

      <div class="error-msg" id="errorMsg"></div>
      <div class="success-msg" id="successMsg"></div>

      <form class="auth-form" id="signupForm">
        <div class="input-group">
          <label>Full Name <span class="req">*</span></label>
          <div class="input-icon">
            <span class="icon">ID</span>
            <input type="text" id="fullName" placeholder="Your full name" required>
          </div>
        </div>

        <div class="input-group">
          <label>Email Address <span class="req">*</span></label>
          <div class="input-icon">
            <span class="icon">@</span>
            <input type="email" id="email" placeholder="engineer@company.com" required>
          </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;" class="two-col">
          <div class="input-group">
            <label>Password <span class="req">*</span></label>
            <div class="input-icon" style="position:relative;">
              <span class="icon">PW</span>
              <input type="password" id="password" placeholder="Min. 8 characters" required style="padding-right:54px;">
              <button type="button" class="password-toggle" id="togglePwd">SHOW</button>
            </div>
            <div class="password-req">Minimum 8 characters</div>
          </div>

          <div class="input-group">
            <label>Confirm Password <span class="req">*</span></label>
            <div class="input-icon">
              <span class="icon">PW</span>
              <input type="password" id="confirmPassword" placeholder="Repeat password" required>
            </div>
          </div>
        </div>

        <div class="input-group">
          <label>Select Your Role <span class="req">*</span></label>
          <div class="role-grid">
            <div class="role-option selected" onclick="selectRole('viewer', this)">
              <div class="role-name">Viewer</div>
              <div class="role-desc">Read only</div>
            </div>

            <div class="role-option" onclick="selectRole('engineer', this)">
              <div class="role-name">Engineer</div>
              <div class="role-desc">Upload and view</div>
            </div>

            <div class="role-option" onclick="selectRole('manager', this)">
              <div class="role-name">Manager</div>
              <div class="role-desc">Manage team</div>
            </div>

            <div class="role-option" onclick="selectRole('admin', this)">
              <div class="role-name">Admin</div>
              <div class="role-desc">Full access</div>
            </div>
          </div>
        </div>

        <label
          style="display:flex;align-items:flex-start;gap:10px;cursor:pointer;font-size:13px;color:var(--text-secondary);text-transform:none;letter-spacing:0;font-weight:400;">
          <input type="checkbox" id="terms"
            style="width:16px;height:16px;accent-color:#38bdf8;margin-top:2px;flex-shrink:0;">
          I agree to the Terms of Service and Privacy Policy for TunnelKMS
        </label>

        <button type="submit" class="btn btn-primary btn-full btn-lg" id="signupBtn">
          Submit Access Request
        </button>
      </form>

      <div class="auth-divider" style="margin:20px 0;">Already have an account?</div>

      <div style="text-align:center;">
        <a href="login.html" class="btn btn-ghost btn-full">Sign In Instead</a>
      </div>
    </div>
  </div>

  <script src="../js/app.js"></script>

  <script>
    let selectedRole = "viewer";

    function selectRole(role, el) {
      selectedRole = role;

      document.querySelectorAll(".role-option").forEach(function (option) {
        option.classList.remove("selected");
      });

      el.classList.add("selected");
    }

    document.getElementById("togglePwd").addEventListener("click", function () {
      const input = document.getElementById("password");
      const show = input.type === "password";

      input.type = show ? "text" : "password";
      this.textContent = show ? "HIDE" : "SHOW";
    });

    document.getElementById("signupForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const errEl = document.getElementById("errorMsg");
      const sucEl = document.getElementById("successMsg");
      const btn = document.getElementById("signupBtn");

      errEl.classList.remove("show");
      errEl.textContent = "";
      sucEl.style.display = "none";

      const fullName = document.getElementById("fullName").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const confirm = document.getElementById("confirmPassword").value;
      const terms = document.getElementById("terms").checked;

      if (!fullName) {
        errEl.textContent = "Please enter your full name";
        errEl.classList.add("show");
        return;
      }

      if (password !== confirm) {
        errEl.textContent = "Passwords do not match";
        errEl.classList.add("show");
        return;
      }

      if (password.length < 8) {
        errEl.textContent = "Password must be at least 8 characters";
        errEl.classList.add("show");
        return;
      }

      if (!terms) {
        errEl.textContent = "Please accept the terms and conditions";
        errEl.classList.add("show");
        return;
      }

      btn.innerHTML = '<span class="spinner"></span> Submitting request...';
      btn.disabled = true;

      try {
        await API.post("/account/request-account", {
          fullName: fullName,
          email: email,
          password: password,
          organization: "TunnelKMS Construction",
          role: selectedRole
        });

        sucEl.innerHTML = "<strong>Access request submitted.</strong><br>Your account is waiting for admin approval. You can login after approval.";
        sucEl.style.display = "block";

        document.getElementById("signupForm").style.display = "none";
      } catch (err) {
        errEl.textContent = err.message || "Account request failed";
        errEl.classList.add("show");

        btn.innerHTML = "Submit Access Request";
        btn.disabled = false;
      }
    });
  </script>
    <script src="/js/final-ui-fix.js"></script>
    <script src="/js/nav-dashboard-only.js"></script>
</body>

</html>
