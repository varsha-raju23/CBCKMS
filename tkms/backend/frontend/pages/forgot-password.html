<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password — TunnelKMS</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .auth-page { min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg-primary);padding:20px;
      background-image:radial-gradient(ellipse at 50% 50%, rgba(245,158,11,.05) 0%, transparent 60%); }
  </style>
  <link rel="stylesheet" href="/css/professional-ui-fix.css">
  <link rel="stylesheet" href="/css/custom-select-fix.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon"></div>
      <h1>Forgot Password</h1>
      <p>Enter your email to receive a reset link</p>
    </div>

    <div id="successMsg" style="display:none;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#6ee7b7;padding:16px;border-radius:var(--radius-sm);font-size:14px;text-align:center;margin-bottom:16px;"></div>

    <form class="auth-form" id="forgotForm">
      <div class="input-group">
        <label>Email Address</label>
        <div class="input-icon">
          <span class="icon"></span>
          <input type="email" id="email" placeholder="your@email.com" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" id="submitBtn">Send Reset Link →</button>
    </form>

    <div style="text-align:center;margin-top:20px;">
      <a href="login.html" style="color:var(--text-secondary);font-size:14px;">â† Back to Login</a>
    </div>
  </div>
</div>
<script src="../js/app.js"></script>
<script>
  document.getElementById('forgotForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.innerHTML = '<span class="spinner"></span> Sending...';
    btn.disabled = true;
    try {
      await API.post('/auth/forgot-password', { email: document.getElementById('email').value.trim() });
      document.getElementById('successMsg').innerHTML = ' If that email is registered, a reset link has been sent. Check your inbox.';
      document.getElementById('successMsg').style.display = 'block';
      document.getElementById('forgotForm').style.display = 'none';
    } catch (err) {
      Toast.error(err.message);
      btn.innerHTML = 'Send Reset Link →';
      btn.disabled = false;
    }
  });
</script>
  <script src="/js/professional-ui-fix.js"></script>
  <script src="/js/custom-select-fix.js"></script>
</body>
</html>
