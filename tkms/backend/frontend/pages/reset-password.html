<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>Reset Password - CBCKMS</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .reset-box { width: 100%; max-width: 420px; padding: 30px; border-radius: 12px; background: rgba(15, 30, 51, 0.95); }
        .reset-box input, .reset-box button { width: 100%; margin-top: 12px; padding: 12px; border-radius: 8px; }
        .reset-box button { cursor: pointer; }
        #message { margin-top: 15px; }
    </style>
</head>
<body>
    <div class="reset-box">
        <h2>Reset Password</h2>
        <p>Enter your new password.</p>

        <form id="resetForm">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="New Password" required minlength="6">
            <input type="password" id="confirmPassword" placeholder="Confirm Password" required minlength="6">
            <button type="submit">Reset Password</button>
        </form>

        <div id="message"></div>
        <p><a href="/pages/login.html">Back to Login</a></p>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const token = params.get("token") || "";
        const email = params.get("email") || "";
        document.getElementById("email").value = email;

        document.getElementById("resetForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirmPassword").value;
            const emailValue = document.getElementById("email").value;
            const messageBox = document.getElementById("message");

            if (password !== confirmPassword) {
                messageBox.innerHTML = "Passwords do not match";
                return;
            }

            const res = await fetch("/api/auth/reset-password", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ token, email: emailValue, password })
            });

            const data = await res.json();
            messageBox.innerHTML = data.message || "Done";

            if (data.success) {
                setTimeout(() => {
                    window.location.href = "/pages/login.html";
                }, 2000);
            }
        });
    </script>
</body>
</html>
