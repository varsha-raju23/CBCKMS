<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — TunnelKMS</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .auth-page { min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg-primary);padding:20px; }
    .password-toggle { position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:18px; }
  </style>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">🔐</div>
      <h1>Reset Password</h1>
      <p>Enter your new password below</p>
    </div>

    <div id="errorMsg" style="display:none;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5;padding:12px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:16px;"></div>
    <div id="successMsg" style="display:none;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:#6ee7b7;padding:16px;border-radius:var(--radius-sm);font-size:14px;text-align:center;margin-bottom:16px;"></div>

    <form class="auth-form" id="resetForm">
      <div class="input-group">
        <label>New Password</label>
        <div class="input-icon" style="position:relative;">
          <span class="icon">🔒</span>
          <input type="password" id="password" placeholder="Min. 8 characters" required style="padding-right:44px;">
          <button type="button" class="password-toggle" onclick="togglePwd()">👁️</button>
        </div>
      </div>
      <div class="input-group">
        <label>Confirm New Password</label>
        <div class="input-icon">
          <span class="icon">🔒</span>
          <input type="password" id="confirmPwd" placeholder="Repeat new password" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" id="submitBtn">Reset Password →</button>
    </form>
  </div>
</div>
<script src="../js/app.js"></script>
<script>
  function togglePwd() {
    const i = document.getElementById('password');
    i.type = i.type === 'text' ? 'password' : 'text';
  }

  const token = new URLSearchParams(window.location.search).get('token');
  if (!token) {
    document.getElementById('errorMsg').textContent = 'Invalid reset link. Please request a new one.';
    document.getElementById('errorMsg').style.display = 'block';
    document.getElementById('resetForm').style.display = 'none';
  }

  document.getElementById('resetForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const p = document.getElementById('password').value;
    const cp = document.getElementById('confirmPwd').value;
    const errEl = document.getElementById('errorMsg');
    errEl.style.display = 'none';

    if (p !== cp) { errEl.textContent = 'Passwords do not match'; errEl.style.display = 'block'; return; }
    if (p.length < 8) { errEl.textContent = 'Password must be at least 8 characters'; errEl.style.display = 'block'; return; }

    const btn = document.getElementById('submitBtn');
    btn.innerHTML = '<span class="spinner"></span> Resetting...';
    btn.disabled = true;

    try {
      await API.post('/auth/reset-password', { token, password: p });
      document.getElementById('successMsg').innerHTML = '✅ Password reset successfully! <a href="login.html">Login now →</a>';
      document.getElementById('successMsg').style.display = 'block';
      document.getElementById('resetForm').style.display = 'none';
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
      btn.innerHTML = 'Reset Password →';
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
